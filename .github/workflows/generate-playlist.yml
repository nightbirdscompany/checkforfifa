name: Generate playlist.m3u

on:
  schedule:
    - cron: '0 */4 * * *'  # Run every 4 hours
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    paths:
      - 'channels.json'
      - 'generate_playlist.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate playlist
        run: |
          python3 generate_playlist.py
          echo "Exit code: $?"

      - name: Check if playlist was created
        run: |
          if [ -f "playlist.m3u" ]; then
            echo "✅ playlist.m3u exists"
            echo "Content preview:"
            head -n 5 playlist.m3u
            wc -l playlist.m3u
          else
            echo "❌ playlist.m3u NOT created!"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Always update the file
          git add playlist.m3u
          
          # Try to commit, ignore if no changes
          if git commit -m "Auto: update playlist.m3u [skip ci]"; then
            echo "✅ Committed successfully"
            git push
            echo "✅ Pushed successfully"
          else
            echo "ℹ️ No changes to commit"
          fi
