name: Generate playlist.m3u

on:
  schedule:
    - cron: '0 */4 * * *'  # Run every 4 hours
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    paths:
      - 'channels.json'
      - 'generate_playlist.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests
          pip install --upgrade pip

      - name: List files before generation
        run: |
          echo "📁 Current directory contents:"
          ls -la
          echo "📁 Python files:"
          ls -la *.py || echo "No Python files found"

      - name: Generate playlist
        run: |
          python3 generate_playlist.py
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Verify playlist was created
        run: |
          echo "📁 Files after generation:"
          ls -la
          
          if [ -f "playlist.m3u" ]; then
            echo "✅ playlist.m3u exists"
            echo "📄 Content preview (first 10 lines):"
            head -n 10 playlist.m3u
            echo "📊 Total lines:"
            wc -l playlist.m3u
          else
            echo "❌ playlist.m3u NOT created!"
            echo "📁 All files in directory:"
            ls -la
            exit 1
          fi

      - name: Commit and push playlist
        run: |
          # Check if playlist.m3u exists
          if [ ! -f "playlist.m3u" ]; then
            echo "❌ playlist.m3u not found!"
            exit 1
          fi
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the file
          git add playlist.m3u
          
          # Check if there are changes
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            echo "📝 Changes detected, committing..."
            git commit -m "Auto: update playlist.m3u [skip ci]"
            echo "✅ Committed successfully"
            
            # Push with token - ensure correct branch name (main or master)
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
            echo "✅ Pushed successfully"
          fi

      - name: Upload playlist as artifact
        uses: actions/upload-artifact@v4  # FIXED: Updated to v4
        with:
          name: playlist
          path: playlist.m3u
          if-no-files-found: error
