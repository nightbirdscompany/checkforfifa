name: Generate playlist.m3u

on:
  push:
    paths:
      - 'channels.json'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required for pushing changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for proper commit
          token: ${{ secrets.GITHUB_TOKEN }}  # Use the default token

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          cache: 'pip'  # Cache pip packages for faster runs

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate playlist.m3u from channels.json
        run: python3 generate_playlist.py

      - name: Commit and push playlist.m3u
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if playlist.m3u exists and has changes
          if [ -f "playlist.m3u" ]; then
            git add playlist.m3u
            # Only commit if there are changes
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Auto: update playlist.m3u [skip ci]"
              git push
              echo "✅ Playlist updated and pushed successfully!"
            fi
          else
            echo "❌ playlist.m3u was not generated!"
            exit 1
          fi
